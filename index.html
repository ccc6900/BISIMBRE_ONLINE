    <style>
        :root {
            --bg: #141419;
            --txt: #ffffff;
            --btn: #2ecc71;
            --bad: #e74c3c;
            --neu: #34495e;
            --warn: #f1c40f;
        }
        body {
            font-family: sans-serif;
            background: var(--bg);
            color: var(--txt);
            text-align: center;
            padding: 10px;
            margin: 0;
        }
        .btn {
            background: var(--neu);
            color: white;
            border: none;
            padding: 14px;
            margin: 6px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 90%;
            max-width: 290px;
        }
        .btn-go { background: var(--btn); }
        .btn-stop { background: var(--bad); }
        .btn-warn { background: var(--warn); color:#000; }
        #pad {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: var(--bad);
            color: white;
            font-size: 22px;
            font-weight: bold;
            border: 10px solid #cbd5e1;
            margin: 25px auto;
            cursor: pointer;
        }
        #pad:disabled {
            background: #7f8c8d;
            cursor: not-allowed;
        }
        .box {
            background: rgba(255,255,255,0.08);
            padding: 12px;
            border-radius: 8px;
            margin: 15px auto;
            max-width: 420px;
        }
        .row {
            display: flex;
            justify-content: space-between;
            padding: 6px 12px;
            border-bottom: 1px dashed #5758bb;
        }
        .hidden { display: none; }
        #timer, #timer-admin {
            font-size: 24px;
            font-weight: bold;
            color: var(--warn);
            margin: 10px 0;
        }
    </style>
</head>

        function conectar(tipo) {
            rol = tipo;
            salaId = SALA_FIJA;
            document.getElementById('room-title').innerText = salaId;

            if (typeof Ably === 'undefined') {
                return alert("Error: Ably no se ha cargado correctamente.");
            }

            ably = new Ably.Realtime(ABLY_KEY);
            net = ably.channels.get('room-' + salaId);
            net.subscribe('ev', function(m) { leer(m.data); });

            document.getElementById('p-login').classList.add('hidden');
            if(rol === 'admin') {
                document.getElementById('p-admin').classList.remove('hidden');
                document.getElementById('p-scores').classList.remove('hidden');
            } else {
                document.getElementById('p-player').classList.remove('hidden');
            }
        }

        function leer(data) {
            if (!data || !data.t) return;

            if(data.t === 'go') {
                primero = null; fallidos = [];
                audioLocked = true;
                document.getElementById('log-buzz').innerText = "";
                const time = data.time || 20;
                startCountdown(time); // ahora cuenta hacia atrás tanto para admin como para jugador
                if(rol === 'player' && miNombre) {
                    lock(true, "Música sonando... (" + time + "s)");
                }
            }

            if(data.t === 'open') {
                audioLocked = false;
                if(rol === 'admin') {
                    document.getElementById('status').innerText = "¡Pulsadores abiertos!";
                    document.getElementById('timer-admin').innerText = "";
                }
            }

            if(data.t === 'hit') {
                if(!primero) {
                    primero = data.n;
                    document.getElementById('log-buzz').innerText = "📢 " + primero + " está respondiendo...";
                    if(rol === 'admin') {
                        document.getElementById('status').innerText = "Responde: " + primero;
                    }
                }
                if(rol === 'player') {
                    lock(true, primero + " respondiendo...");
                }
            }

            if(data.t === 'fail') {
                fallidos.push(data.n); primero = null;
                document.getElementById('log-buzz').innerText = "❌ " + data.n + " falló. ¡Sigue la ronda!";
                if(rol === 'admin') {
                    document.getElementById('status').innerText = "Falló: " + data.n + ". Esperando rebote...";
                }
                if(rol === 'player' && miNombre) {
                    if(!fallidos.includes(miNombre)) {
                        lock(false, "💥 ¡REBOTE! ¡PULSA! 💥");
                    } else {
                        lock(true, "Eliminado en esta canción");
                    }
                }
            }

            if(data.t === 'up') {
                tabla = data.s || {};
                verPuntos();
            }

            if(data.t === 'end') {
                primero = null; fallidos = []; audioLocked = false;
                clearCountdown();
                document.getElementById('log-buzz').innerText = "";
                if(rol === 'player') {
                    lock(true, "Preparando siguiente tema...");
                }
                if(rol === 'admin') {
                    document.getElementById('status').innerText = "Ronda terminada. Esperando nueva canción...";
                    document.getElementById('timer-admin').innerText = "";
                }
            }
        }

        function entrar() {
            const n = document.getElementById('nick').value.trim();
            if(!n) return;
            miNombre = n;
            document.getElementById('p-join').classList.add('hidden');
            document.getElementById('p-game').classList.remove('hidden');
            document.getElementById('p-scores').classList.remove('hidden');
            document.getElementById('user-title').innerText = miNombre;
            if(!tabla[miNombre]) {
                tabla[miNombre] = 0;
                net.publish('ev', {t:'up', s:tabla});
            }
        }

        function lock(si, txt) {
            const btn = document.getElementById('pad');
            const txtEl = document.getElementById('pad-txt');
            btn.disabled = si; btn.innerText = txt; txtEl.innerText = txt;
        }

        function pulsar() {
            if(audioLocked) return;
            net.publish('ev', {t:'hit', n:miNombre});
        }

        function elegirCancionAleatoria() {
            // Trabajamos con índices (no con URLs) para poder sacar la pareja
            // sin_voz/con_voz de la misma posición en los dos arrays.
            const indicesDisponibles = CANCEIONES_SIN_VOZ
                .map((_, i) => i)
                .filter(i => !cancionesUsadas.includes(CANCEIONES_SIN_VOZ[i]));

            if (indicesDisponibles.length === 0) {
                cancionesUsadas = [];
                localStorage.setItem('cancionesUsadas_' + SALA_FIJA, JSON.stringify(cancionesUsadas));
                alert("¡Todas las canciones han sido usadas! Reiniciando lista...");
                return elegirCancionAleatoria();
            }

            const randomIndex = indicesDisponibles[Math.floor(Math.random() * indicesDisponibles.length)];
            cancionActualIndex = randomIndex;
            cancionActual = CANCEIONES_SIN_VOZ[randomIndex];
            cancionConVoz = CANCIONES_CON_VOZ[randomIndex];
            cancionesUsadas.push(cancionActual);
            localStorage.setItem('cancionesUsadas_' + SALA_FIJA, JSON.stringify(cancionesUsadas));
            return cancionActual;
        }

        function mostrarTituloAdmin() {
            if (rol !== 'admin') return;
            const el = document.getElementById('titulo-admin');
            if (!el) return;
            const titulo = (cancionActualIndex !== null && TITULOS_CANCIONES[cancionActualIndex])
                ? TITULOS_CANCIONES[cancionActualIndex]
                : "Título no disponible";
            el.innerText = "🎵 " + titulo;
        }

        // Reproduce una URL de audio con una etiqueta <audio> normal (no usa
        // Web Audio API / fetch, así que no depende de que Google Drive
        // permita CORS: esto es lo que causaba el "error al cargar la canción").
        function reproducirAudio(url, segundos, textoEstado) {
            document.getElementById('status').innerText = textoEstado;

            if (audioElement) {
                try { audioElement.pause(); } catch(e) {}
                audioElement = null;
            }

            audioElement = new Audio(url);
            audioElement.play().catch(function(err) {
                alert("Error al reproducir la canción: " + err.message);
                net.publish('ev', {t:'end'});
                document.getElementById('status').innerText = "Error: Canción no válida";
            });

            setTimeout(function() {
                if (audioElement) {
                    try { audioElement.pause(); } catch(e) {}
                }
                net.publish('ev', {t:'open'});
                document.getElementById('status').innerText = "¡Pulsadores abiertos!";
            }, segundos * 1000);
        }

        function sonarConTiempo(tiempo) {
            if (!cancionActual) {
                elegirCancionAleatoria();
            }

            selectedTime = tiempo;
            net.publish('ev', {t:'go', time: selectedTime});
            mostrarTituloAdmin();
            reproducirAudio(cancionActual, selectedTime, "Sonando... Bloqueado (" + selectedTime + "s)");
        }

        function sonarConVoz() {
            if (!cancionConVoz) {
                alert("Primero debes reproducir una canción sin voz");
                return;
            }

            selectedTime = 20;
            net.publish('ev', {t:'go', time: selectedTime});
            reproducirAudio(cancionConVoz, selectedTime, "Sonando CON VOZ... (" + selectedTime + "s)");
        }

        function fallo() {
            if(!primero) return alert("Nadie ha pulsado");
            net.publish('ev', {t:'fail', n:primero});
        }

        function nadieAcertado() {
            clearCountdown();
            if (audioElement) {
                try { audioElement.pause(); } catch(e) {}
                audioElement = null;
            }
            primero = null;
            fallidos = [];
            audioLocked = false;
            net.publish('ev', {t:'end'});
            document.getElementById('status').innerText = "Nadie acertó. Siguiente canción...";
            const tituloEl = document.getElementById('titulo-admin');
            if (tituloEl) tituloEl.innerText = "";

            cancionActual = null;
            cancionConVoz = null;
            cancionActualIndex = null;
        }

        function verPuntos() {
            const c = document.getElementById('list-scores');
            c.innerHTML = "";
            const lista = Object.entries(tabla).sort(function(a,b){return b[1]-a[1];});
            for(let i = 0; i < lista.length; i++) {
                let item = lista[i];
                c.innerHTML += '<div class="row"><span>👤 ' + item[0] + '</span><strong>' + item[1] + ' Pts</strong></div>';
            }
        }

        function startCountdown(seconds) {
            clearCountdown();
            let timeLeft = seconds;
            document.getElementById('timer').innerText = timeLeft;
            if(rol === 'admin') {
                document.getElementById('timer-admin').innerText = timeLeft + "s";
            }

            countdownInterval = setInterval(function() {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if(rol === 'admin') {
                    document.getElementById('timer-admin').innerText = timeLeft + "s";
                }

                if(timeLeft <= 0) {
                    clearCountdown();
                    if(rol === 'admin') {
                        net.publish('ev', {t:'open'});
                        document.getElementById('status').innerText = "¡Pulsadores abiertos!";
                        document.getElementById('timer-admin').innerText = "";
                    }
                    if(rol === 'player' && miNombre) {
                        lock(false, "💥 ¡PULSA! 💥");
                    }
                }
            }, 1000);
        }

        function clearCountdown() {
            if(countdownInterval) {
                clearInterval(countdownInterval);
                countdownInterval = null;
            }
            if(rol === 'player') {
                document.getElementById('timer').innerText = "";
            }
            if(rol === 'admin') {
                document.getElementById('timer-admin').innerText = "";
            }
        }

        (function autoEntrada() {
            const params = new URLSearchParams(window.location.search);
            const rolUrl = params.get('rol');
            if(rolUrl === 'admin' || rolUrl === 'player') {
                conectar(rolUrl);
            }
        })();
    </script>
</body>
</html>
