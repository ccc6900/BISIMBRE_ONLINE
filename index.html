<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PISTA MUSICAL ONLINE</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        :root {
            --bg: #141419;
            --txt: #ffffff;
            --btn: #2ecc71;
            --bad: #e74c3c;
            --neu: #34495e;
            --warn: #f1c40f;
        }
        body {
            font-family: sans-serif;
            background: var(--bg);
            color: var(--txt);
            text-align: center;
            padding: 10px;
            margin: 0;
        }
        .btn {
            background: var(--neu);
            color: white;
            border: none;
            padding: 14px;
            margin: 6px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 90%;
            max-width: 290px;
        }
        .btn-go { background: var(--btn); }
        .btn-stop { background: var(--bad); }
        .btn-warn { background: var(--warn); color:#000; }
        #pad {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: var(--bad);
            color: white;
            font-size: 22px;
            font-weight: bold;
            border: 10px solid #cbd5e1;
            margin: 25px auto;
            cursor: pointer;
        }
        #pad:disabled {
            background: #7f8c8d;
            cursor: not-allowed;
        }
        .box {
            background: rgba(255,255,255,0.08);
            padding: 12px;
            border-radius: 8px;
            margin: 15px auto;
            max-width: 420px;
        }
        .row {
            display: flex;
            justify-content: space-between;
            padding: 6px 12px;
            border-bottom: 1px dashed #5758bb;
        }
        .hidden { display: none; }
        #timer, #timer-admin {
            font-size: 24px;
            font-weight: bold;
            color: var(--warn);
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>🎵 Sala: <span id="room-title">PISTA MUSICAL ONLINE</span></h1>

    <div id="p-login">
        <p>Selecciona tu rol:</p>
        <button class="btn btn-go" onclick="conectar('admin')">Entrar como Presentador</button><br>
        <button class="btn" onclick="conectar('player')">Entrar como Jugador</button>
    </div>

    <div id="p-admin" class="hidden">
        <h3>Controles del Presentador</h3>
        <div id="timer-admin"></div>
        <div class="box">
            <h4>Selecciona tiempo:</h4>
            <button class="btn btn-go" onclick="sonarConTiempo(20)">🎵 Sin voz 20 segundos (5 pts)</button><br>
            <button class="btn btn-go" onclick="sonarConTiempo(30)">🎵 Sin voz 30 segundos (4 pts)</button><br>
            <button class="btn btn-go" onclick="sonarConTiempo(40)">🎵 Sin voz 40 segundos (3 pts)</button><br>
            <button class="btn btn-go" onclick="sonarConTiempo(50)">🎵 Sin voz 50 segundos (2 pts)</button><br>
            <button class="btn btn-go" onclick="sonarConVoz()">🎤 Canción CON VOZ (1 pt)</button><br>
            <button class="btn btn-warn" onclick="fallo()">❌ Fallo: Bloquear y reabrir</button><br>
            <button class="btn btn-stop" onclick="nadieAcertado()">⏹️ Nadie ha acertado</button>
        </div>
        <p id="status" style="font-weight:bold;">Estado: Esperando canción...</p>
    </div>

    <div id="p-player" class="hidden">
        <div id="p-join">
            <input type="text" id="nick" placeholder="Tu Nombre o Apodo" style="padding:10px; width:80%;"><br><br>
            <button class="btn btn-go" onclick="entrar()">Entrar a Jugar</button>
        </div>
        <div id="p-game" class="hidden">
            <h3 id="user-title">Jugador</h3>
            <div id="timer"></div>
            <button id="pad" disabled onclick="pulsar()">BLOQUEADO</button>
            <p id="pad-txt">Espera a que empiece...</p>
        </div>
    </div>

    <div id="p-scores" class="hidden box">
        <h3>🏆 Puntuaciones en Directo</h3>
        <div id="log-buzz" style="color:#2ecc71; font-size:18px; font-weight:bold;"></div><br>
        <div id="list-scores"></div>
    </div>

    <script>
        // CONFIGURACIÓN FIJA (NOMBRE DE SALA ACTUALIZADO)
        const ABLY_KEY = "TPrqNg.rvP-xA:BVcZqQhOyOuU3uv3hrN1mpGOM6PPlLurFPpo5uR0BZk";
        const SALA_FIJA = "PISTA MUSICAL ONLINE"; // 🔥 CAMBIADO A "PISTA MUSICAL ONLINE"
        let selectedTime = 20;
        let cancionActual = null;
        let cancionConVoz = null;
        let ably, net, rol = '', miNombre = '';
        let salaId = '', tabla = {}, primero = null;
        let fallidos = [], source, ctx, countdownInterval = null;
        let audioLocked = false;
        let cancionesUsadas = JSON.parse(localStorage.getItem('cancionesUsadas_' + SALA_FIJA) || []);

        // 🎵 TUS 47 ENLACES DE GOOGLE DRIVE (ya convertidos)

            "https://drive.google.com/uc?export=download&id=102QMHeOAf2g0S0Kgtx-EaPHsELTpy5k4",
            "https://drive.google.com/uc?export=download&id=12lW45uisLYgbssD02QmQGQmtl_rtuTUs",
            "https://drive.google.com/uc?export=download&id=13KnGbf3EUM-FQ42JHK4EsiI5LY_MBTi6",
            "https://drive.google.com/uc?export=download&id=19ZFKif7w-GhtMASivBsWXL2495_YZuTH",
            "https://drive.google.com/uc?export=download&id=19wbHfl22PlhHI1FwueDZ398nRw2geXDg",
            "https://drive.google.com/uc?export=download&id=1C5InITGTEwnc7CNkqH9W4t0tBV-hnCXT",
            "https://drive.google.com/uc?export=download&id=1HJkS-5bCEYgSqSpTJumnevMuS0tzlYlw",
            "https://drive.google.com/uc?export=download&id=1JHJ45cplxCPtnxDYmT2tNTwgZuL5meEG",
            "https://drive.google.com/uc?export=download&id=1KVVy8ktlFdxwjOGKy0Or3WVGf6Smy6oY",

            "https://drive.google.com/uc?export=download&id=1Ve5v6sy0U_6W03LQwfXgblD823iQvz8b",
            "https://drive.google.com/uc?export=download&id=1Zo7ajmiFmjEm3FW0TjZrXlfYJmPnBnjc",
            "https://drive.google.com/uc?export=download&id=1a3on0VBcbxTZNOeVS4inaj-wARhXTljV",
            "https://drive.google.com/uc?export=download&id=1a6bwmO9uCbb-3-v6clgWjOTq_SMJKGOU",
            "https://drive.google.com/uc?export=download&id=1aGIY9iwBxdboKW3ptOOroRjj3yBjsm2b",
            "https://drive.google.com/uc?export=download&id=1drkPX1W03smnZLtMkTMxXJacdPvRn4VO",
            "https://drive.google.com/uc?export=download&id=1e3QTu3LX013mIc3y3s2mkgQ0AtBgWs7m",

            "https://drive.google.com/uc?export=download&id=1kYH_ygKo9a7F0ybsiHUXqvYQYZxIhmA6",
            "https://drive.google.com/uc?export=download&id=1tfbCKIItDxj2WjZn2Y95WgChsxTNIdpu",

            "https://drive.google.com/uc?export=download&id=1UhfjjGD8JKgJtQq9_2rfZ37hRZO-G0bj",
            "https://drive.google.com/uc?export=download&id=1JepZzcUIOR3bSSZWXb7sJiIdw_5Gkbwj",
            "https://drive.google.com/uc?export=download&id=1IRgfBm8_a0i0OxAcZG8iPFCSak6JvHNp",
            "https://drive.google.com/uc?export=download&id=11tmpuxhWndvSjffDEsHMJPfpCeHSz8HM",
            "https://drive.google.com/uc?export=download&id=1wuZqyxx6RDwAoURmpVf75o7mSAx4JmUH",
            "https://drive.google.com/uc?export=download&id=1Ldz5b-u-R-AWM8rtrtronXDWL4s8PuZI",
            "https://drive.google.com/uc?export=download&id=1VCYoe-_a-gNdDHn_tcGIoVAxWZejzh1M",
            "https://drive.google.com/uc?export=download&id=1FkFT4uT90LbQLy18QkT5V1xqhABgtvKp",
            "https://drive.google.com/uc?export=download&id=1I3_JQTlEb_sN2QOiGfz8blkI1rz-q04x",
            "https://drive.google.com/uc?export=download&id=1iunKT9SWt40KxwEuzfrBopUxOciGNE6C",
            "https://drive.google.com/uc?export=download&id=1Is2Oa8s-GTMFKB72n6aNBf9X3wfOR218",
            "https://drive.google.com/uc?export=download&id=1B4imea98-TV6eV4PO1F3LZdoe_9TRU1Q",
            "https://drive.google.com/uc?export=download&id=1c0BA6knnKApr1yeRVnLQN_Tz2OUn0h-s",
            "https://drive.google.com/uc?export=download&id=1Ssb1DLihJCwPsZW8TW3UcIinusuE3sVE",
            "https://drive.google.com/uc?export=download&id=1jRQzX-313LeuNQgyzLUtZ331ko9jAYLP",
            "https://drive.google.com/uc?export=download&id=1au8uVDS1xpE9QBcCIJYOYbl20N2bn-dj",
            "https://drive.google.com/uc?export=download&id=12XA6ZnJCHO_RG5L_O4Otdrw7zE6r8tdh",
            "https://drive.google.com/uc?export=download&id=1jd6ay6lT0AX1eHY48uDyOsAmGmV7P7DW",
            "https://drive.google.com/uc?export=download&id=11tSi6jHcd2IssToIzBSo1CQAjeSoODGT",
            "https://drive.google.com/uc?export=download&id=16vQUp_XKeBQrtcHXYxqWMlZ8cdbse0AQ",
            "https://drive.google.com/uc?export=download&id=1UMXvztl9lf3sgV3OQhZvE6WCsbGpcWvf",
            "https://drive.google.com/uc?export=download&id=16Xxw046TGvZT41DTmkHVRFhY5eYhnxTW"
        ];

        // Función para obtener la URL con voz a partir de la URL sin voz
        function getUrlConVoz(urlSinVoz) {
            return urlSinVoz.replace("_sin voz", "_con voz").replace("sin%20voz", "con%20voz");
        }

        function conectar(tipo) {
            rol = tipo;
            salaId = SALA_FIJA;
            document.getElementById('room-title').innerText = salaId;

            if (typeof Ably === 'undefined') {
                return alert("Error: Ably no se ha cargado correctamente.");
            }

            ably = new Ably.Realtime(ABLY_KEY);
            net = ably.channels.get('room-' + salaId);
            net.subscribe('ev', function(m) { leer(m.data); });

            document.getElementById('p-login').classList.add('hidden');
            if(rol === 'admin') {
                document.getElementById('p-admin').classList.remove('hidden');
                document.getElementById('p-scores').classList.remove('hidden');
            } else {
                document.getElementById('p-player').classList.remove('hidden');
            }
        }

        function leer(data) {
            if (!data || !data.t) return;

            if(data.t === 'go') {
                primero = null; fallidos = [];
                audioLocked = true;
                document.getElementById('log-buzz').innerText = "";
                const time = data.time || 20;
                document.getElementById('timer').innerText = time;
                if(rol === 'admin') {
                    document.getElementById('timer-admin').innerText = time + "s";
                }
                if(rol === 'player' && miNombre) {
                    lock(true, "Música sonando... (" + time + "s)");
                    startCountdown(time);
                }
            }

            if(data.t === 'open') {
                audioLocked = false;
                if(rol === 'admin') {
                    document.getElementById('status').innerText = "¡Pulsadores abiertos!";
                    document.getElementById('timer-admin').innerText = "";
                }
            }

            if(data.t === 'hit') {
                if(!primero) {
                    primero = data.n;
                    document.getElementById('log-buzz').innerText = "📢 " + primero + " está respondiendo...";
                    if(rol === 'admin') {
                        document.getElementById('status').innerText = "Responde: " + primero;
                    }
                }
                if(rol === 'player') {
                    lock(true, primero + " respondiendo...");
                }
            }

            if(data.t === 'fail') {
                fallidos.push(data.n); primero = null;
                document.getElementById('log-buzz').innerText = "❌ " + data.n + " falló. ¡Sigue la ronda!";
                if(rol === 'admin') {
                    document.getElementById('status').innerText = "Falló: " + data.n + ". Esperando rebote...";
                }
                if(rol === 'player' && miNombre) {
                    if(!fallidos.includes(miNombre)) {
                        lock(false, "💥 ¡REBOTE! ¡PULSA! 💥");
                    } else {
                        lock(true, "Eliminado en esta canción");
                    }
                }
            }

            if(data.t === 'up') {
                tabla = data.s || {};
                verPuntos();
            }

            if(data.t === 'end') {
                primero = null; fallidos = []; audioLocked = false;
                clearCountdown();
                document.getElementById('log-buzz').innerText = "";
                if(rol === 'player') {
                    lock(true, "Preparando siguiente tema...");
                }
                if(rol === 'admin') {
                    document.getElementById('status').innerText = "Ronda terminada. Esperando nueva canción...";
                    document.getElementById('timer-admin').innerText = "";
                }
            }
        }

        function entrar() {
            const n = document.getElementById('nick').value.trim();
            if(!n) return;
            miNombre = n;
            document.getElementById('p-join').classList.add('hidden');
            document.getElementById('p-game').classList.remove('hidden');
            document.getElementById('p-scores').classList.remove('hidden');
            document.getElementById('user-title').innerText = miNombre;
            if(!tabla[miNombre]) {
                tabla[miNombre] = 0;
                net.publish('ev', {t:'up', s:tabla});
            }
        }

        function lock(si, txt) {
            const btn = document.getElementById('pad');
            const txtEl = document.getElementById('pad-txt');
            btn.disabled = si; btn.innerText = txt; txtEl.innerText = txt;
        }

        function pulsar() {
            if(audioLocked) return;
            net.publish('ev', {t:'hit', n:miNombre});
        }

        function elegirCancionAleatoria() {
            const disponibles = CANCEIONES_SIN_VOZ.filter(url => !cancionesUsadas.includes(url));
            if (disponibles.length === 0) {
                cancionesUsadas = [];
                localStorage.setItem('cancionesUsadas_' + SALA_FIJA, JSON.stringify(cancionesUsadas));
                alert("¡Todas las canciones han sido usadas! Reiniciando lista...");
                return elegirCancionAleatoria();
            }
            const randomIndex = Math.floor(Math.random() * disponibles.length);
            cancionActual = disponibles[randomIndex];
            cancionConVoz = getUrlConVoz(cancionActual);
            cancionesUsadas.push(cancionActual);
            localStorage.setItem('cancionesUsadas_' + SALA_FIJA, JSON.stringify(cancionesUsadas));
            return cancionActual;
        }

        function sonarConTiempo(tiempo) {
            if (!cancionActual) {
                cancionActual = elegirCancionAleatoria();
                cancionConVoz = getUrlConVoz(cancionActual);
            }

            selectedTime = tiempo;
            net.publish('ev', {t:'go', time: selectedTime});
            document.getElementById('status').innerText = "Sonando... Bloqueado (" + selectedTime + "s)";

            fetch(cancionActual)
                .then(response => response.arrayBuffer())
                .then(buffer => {
                    ctx = new (window.AudioContext || window.webkitAudioContext)();
                    return ctx.decodeAudioData(buffer);
                })
                .then(function(b) {
                    source = ctx.createBufferSource();
                    source.buffer = b;
                    source.connect(ctx.destination);
                    source.start(0);

                    setTimeout(function() {
                        if(source) try { source.stop(); } catch(e) {}
                        if(ctx) try { ctx.close(); } catch(e) {}
                        net.publish('ev', {t:'open'});
                        document.getElementById('status').innerText = "¡Pulsadores abiertos!";
                    }, selectedTime * 1000);
                })
                .catch(function(err) {
                    alert("Error al cargar la canción: " + err.message);
                    net.publish('ev', {t:'end'});
                    document.getElementById('status').innerText = "Error: Canción no válida";
                });
        }

        function sonarConVoz() {
            if (!cancionConVoz) {
                alert("Primero debes reproducir una canción sin voz");
                return;
            }

            selectedTime = 20;
            net.publish('ev', {t:'go', time: selectedTime});
            document.getElementById('status').innerText = "Sonando CON VOZ... (" + selectedTime + "s)";

            fetch(cancionConVoz)
                .then(response => response.arrayBuffer())
                .then(buffer => {
                    ctx = new (window.AudioContext || window.webkitAudioContext)();
                    return ctx.decodeAudioData(buffer);
                })
                .then(function(b) {
                    source = ctx.createBufferSource();
                    source.buffer = b;
                    source.connect(ctx.destination);
                    source.start(0);

                    setTimeout(function() {
                        if(source) try { source.stop(); } catch(e) {}
                        if(ctx) try { ctx.close(); } catch(e) {}
                        net.publish('ev', {t:'open'});
                        document.getElementById('status').innerText = "¡Pulsadores abiertos!";
                    }, selectedTime * 1000);
                })
                .catch(function(err) {
                    alert("Error al cargar la canción con voz: " + err.message);
                    net.publish('ev', {t:'end'});
                    document.getElementById('status').innerText = "Error: Canción no válida";
                });
        }

        function fallo() {
            if(!primero) return alert("Nadie ha pulsado");
            net.publish('ev', {t:'fail', n:primero});
        }

        function nadieAcertado() {
            clearCountdown();
            if(source) try { source.stop(); } catch(e) {}
            if(ctx) try { ctx.close(); } catch(e) {}
            primero = null;
            fallidos = [];
            audioLocked = false;
            net.publish('ev', {t:'end'});
            document.getElementById('status').innerText = "Nadie acertó. Siguiente canción...";

            cancionActual = null;
            cancionConVoz = null;
        }

        function verPuntos() {
            const c = document.getElementById('list-scores');
            c.innerHTML = "";
            const lista = Object.entries(tabla).sort(function(a,b){return b[1]-a[1];});
            for(let i = 0; i < lista.length; i++) {
                let item = lista[i];
                c.innerHTML += '<div class="row"><span>👤 ' + item[0] + '</span><strong>' + item[1] + ' Pts</strong></div>';
            }
        }

        function startCountdown(seconds) {
            clearCountdown();
            let timeLeft = seconds;
            document.getElementById('timer').innerText = timeLeft;
            if(rol === 'admin') {
                document.getElementById('timer-admin').innerText = timeLeft + "s";
            }

            countdownInterval = setInterval(function() {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if(rol === 'admin') {
                    document.getElementById('timer-admin').innerText = timeLeft + "s";
                }

                if(timeLeft <= 0) {
                    clearCountdown();
                    if(rol === 'admin') {
                        net.publish('ev', {t:'open'});
                        document.getElementById('status').innerText = "¡Pulsadores abiertos!";
                        document.getElementById('timer-admin').innerText = "";
                    }
                    if(rol === 'player' && miNombre) {
                        lock(false, "💥 ¡PULSA! 💥");
                    }
                }
            }, 1000);
        }

        function clearCountdown() {
            if(countdownInterval) {
                clearInterval(countdownInterval);
                countdownInterval = null;
            }
            if(rol === 'player') {
                document.getElementById('timer').innerText = "";
            }
            if(rol === 'admin') {
                document.getElementById('timer-admin').innerText = "";
            }
        }

        (function autoEntrada() {
            const params = new URLSearchParams(window.location.search);
            const rolUrl = params.get('rol');
            if(rolUrl === 'admin' || rolUrl === 'player') {
                conectar(rolUrl);
            }
        })();
    </script>
</body>
</html>
